<svg width="32" height="32" viewBox="0 0 21 20" fill="none" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
<style>
  .light-icon { display: none; }
  .dark-icon { display: block; }
  @media (prefers-color-scheme: light) {
    .light-icon { display: block; }
    .dark-icon { display: none; }
  }
</style>
<g class="dark-icon">
  <rect width="21" height="20" fill="url(#pattern-dark)"/>
</g>
<g class="light-icon">
  <rect width="21" height="20" fill="url(#pattern-light)"/>
</g>
<defs>
  <pattern id="pattern-dark" patternContentUnits="objectBoundingBox" width="1" height="1">
    <use xlink:href="#img-dark" transform="matrix(0.00749906 0 0 0.00787402 -0.00993626 0)"/>
  </pattern>
  <pattern id="pattern-light" patternContentUnits="objectBoundingBox" width="1" height="1">
    <use xlink:href="#img-light" transform="matrix(0.00749906 0 0 0.00787402 -0.00993626 0)"/>
  </pattern>
  <image id="img-dark" width="136" height="127" preserveAspectRatio="none" xlink:href="data:image/png;base64,"/>
  <image id="img-light" width="136" height="127" preserveAspectRatio="none" xlink:href="data:image/png;base64,"/>
</defs>
</svg>
