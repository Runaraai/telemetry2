# Nginx reverse proxy configuration for Omniference
# This file should be placed at /etc/nginx/sites-available/omniference
# and symlinked to /etc/nginx/sites-enabled/omniference
# NOTE: Rate limiting zones should be added to /etc/nginx/nginx.conf in the http block

# Upstream backend
upstream omniference_backend {
    server localhost:8000;
    keepalive 32;
}

# Upstream frontend
upstream omniference_frontend {
    server localhost:3000;
    keepalive 32;
}

server {
    listen 80;
    # Server name should be configured via environment variable substitution
    # Use: envsubst < nginx-reverse-proxy.conf.template > /etc/nginx/sites-available/omniference
    # Or manually replace ${NGINX_SERVER_NAME} with your domain/IP
    # Set NGINX_SERVER_NAME environment variable before running envsubst
    # Example: export NGINX_SERVER_NAME="omniference.com www.omniference.com"
    # Default: voertx.cloud www.voertx.cloud (for backward compatibility)
    server_name ${NGINX_SERVER_NAME:-voertx.cloud www.voertx.cloud};

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Increase timeouts for long-running API requests
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    # Proxy settings
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # Buffer settings
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;

    # WebSocket routes - dedicated handling for telemetry streams
    location /ws/ {
        proxy_pass http://omniference_backend;
        
        # WebSocket-specific headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering for WebSocket
        proxy_buffering off;
        
        # Long timeout for persistent connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        
        # No rate limiting for WebSocket streams
        access_log off;
    }

    # API routes - proxy to backend
    location /api/ {
        # limit_req zone=api_limit burst=20 nodelay;  # Uncomment if rate limiting zones are configured in nginx.conf
        
        proxy_pass http://omniference_backend;
        
        # WebSocket support for real-time features
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check endpoint
    location /health {
        proxy_pass http://omniference_backend/health;
        access_log off;
    }

    # Telemetry endpoints (if needed to be accessible)
    location /api/telemetry/ {
        # limit_req zone=api_limit burst=20 nodelay;  # Uncomment if rate limiting zones are configured in nginx.conf
        proxy_pass http://omniference_backend;
    }

    # Frontend static assets
    location /static/ {
        proxy_pass http://omniference_frontend;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend routes - proxy to frontend (React app)
    location / {
        # limit_req zone=general_limit burst=50 nodelay;  # Uncomment if rate limiting zones are configured in nginx.conf
        proxy_pass http://omniference_frontend;
        
        # Handle React Router
        proxy_intercept_errors on;
        error_page 404 = @fallback;
    }

    # Fallback for React Router
    location @fallback {
        proxy_pass http://omniference_frontend;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

